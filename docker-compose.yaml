version: "3.8"

services:
  rabbit_db:
    image: postgres:15
    container_name: rabbit_db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_IP}:${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - vava_net

  pgadmin:
    image: dpage/pgadmin4:7
    container_name: rabbit_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASS}
    ports:
      - "${DB_IP}:8080:80"
    depends_on:
      - rabbit_db
    networks:
      - vava_net

  ai-service:
    build: ./model
    container_name: ai_service
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app
    networks:
      - vava_net

volumes:
  db_data:

networks:
  vava_net:
    driver: bridge
